[General]
# Path to the background image
background=assets/background.png

# Font Family
fontFamily="Rubik"

# Card Drop shadows [true | false]
dropShadows=true

# Background blur [true | false]
blurEnabled=true

# Background blur strength [0.0 to 1.0]
blurStrength=0.6

# Card Opacity [0 to 1]
cardOpacity=0.80

# Background overlay opacity [0 to 1]
overlayOpacity=0.4

# Power Buttons radius (roundness)
buttonRadius=20

# Password input radius (roundness)
passwordInputRadius=20

# Card Border radius (roundness)
cardRadius=80

# Default values
FontSize=11
AvatarSize=120

# Color Scheme
# Do not touch these!
mPrimary=#4cdadb
mOnPrimary=#002022

mSecondary=#95f4f5
mOnSecondary=#003738

mTertiary=#86d0ff
mOnTertiary=#00344d

mError=#ffb4ab
mOnError=#690005

mSurface=#131313
mOnSurface=#e2e2e2

mSurfaceVariant=#353535
mOnSurfaceVariant=#919191

mOutline=#7d7d7d
mShadow=#000000

mHover=#4cdadb
mOnHover=#002022
