mPrimary=#4cdadb
mOnPrimary=#002022

mSecondary=#95f4f5
mOnSecondary=#003738

mTertiary=#86d0ff
mOnTertiary=#00344d

mError=#ffb4ab
mOnError=#690005

mSurface=#131313
mOnSurface=#e2e2e2

mSurfaceVariant=#353535
mOnSurfaceVariant=#919191

mOutline=#7d7d7d
mShadow=#000000

mHover=#4cdadb
